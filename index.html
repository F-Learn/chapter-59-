<script>
    // Chapter 59: Assessment and Management of Patients with Hearing and Balance Disorders – 40 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. The clinic nurse is assessing a child who has been brought to the clinic with signs and symptoms that are suggestive of otitis externa. What assessment finding is characteristic of this diagnosis?",
            options: [
                "A. Tophi on the pinna and ear lobe",
                "B. Dark yellow cerumen in the external auditory canal",
                "C. Pain on manipulation of the auricle",
                "D. Air bubbles visible in the middle ear"
            ],
            correct: 2, // C
            rationale: "Pain when the nurse pulls gently on the auricle in preparation for an otoscopic examination of the ear canal is a characteristic finding in clients with otitis externa. Tophi are deposits of generally painless uric acid crystals; they are a common physical assessment finding in clients diagnosed with gout. Cerumen is a normal finding during assessment of the ear canal. Its presence does not necessarily indicate that inflammation is present. Air bubbles in the middle ear may be visualized with the otoscope; however, these do not indicate a problem involving the ear canal. (PTS:1 REF:p.1938)"
        },
        {
            id: 2,
            question: "2. While reviewing the health history of an older adult experiencing hearing loss the nurse notes the client has had no trauma or loss of balance. What aspect of this client's health history is most likely to be linked to the client's hearing deficit?",
            options: [
                "A. Recent completion of radiation therapy for treatment of thyroid cancer",
                "B. Routine use of quinine for management of leg cramps",
                "C. Allergy to hair coloring and hair spray",
                "D. Previous perforation of the eardrum"
            ],
            correct: 1, // B
            rationale: "Long-term, regular use of quinine for management of leg cramps is associated with loss of hearing acuity. Radiation therapy for cancer should not affect hearing; however, hearing can be significantly compromised by chemotherapy. Allergy to hair products may be associated with otitis externa; however, it is not linked to hearing loss. An ear drum that perforates spontaneously due to the sudden drop in altitude associated with a high dive usually heals well and is not likely to become infected. Recurrent otitis media with perforation can affect hearing as a result of chronic inflammation of the ossicles in the middle ear. (PTS:1 REF:p.1957)"
        },
        {
            id: 3,
            question: "3. A nurse is planning preoperative teaching for a client with hearing loss due to otosclerosis. The client is scheduled for a stapedectomy with insertion of a prosthesis. What information is most crucial to include in the client's preoperative teaching?",
            options: [
                "A. The procedure is an effective, time-tested treatment for sensory hearing loss.",
                "B. The client is likely to experience resolution of conductive hearing loss after the procedure.",
                "C. Several months of postprocedure rehabilitation will be needed to maximize benefits.",
                "D. The procedure is experimental, but early indications suggest great therapeutic benefits."
            ],
            correct: 1, // B
            rationale: "Stapedectomy is a very successful time-tested procedure, resulting in the restoration of conductive hearing loss. Lengthy rehabilitation is not normally required. (PTS:1 REF:p.1953)"
        },
        {
            id: 4,
            question: "4. The nurse is providing discharge education for a client with a new diagnosis of Ménière disease. What food should the client be instructed to limit or avoid?",
            options: [
                "A. Sweet pickles",
                "B. Frozen yogurt",
                "C. Shellfish",
                "D. Red meat"
            ],
            correct: 0, // A
            rationale: "The client with Ménière disease should avoid foods high in salt and/or sugar; sweet pickles are high in both. Milk products are not contraindicated. Any type of meat, fish, or poultry is permitted, with the exception of canned or pickled varieties. In general, the client with Ménière disease should avoid or limit canned and processed foods. (PTS:1 REF:p.1954)"
        },
        {
            id: 5,
            question: "5. Following a motorcycle accident, an adolescent client is brought to the ED. What physical assessment findings related to the ear should be reported by the nurse immediately?",
            options: [
                "A. The malleus can be visualized during otoscopic examination.",
                "B. The tympanic membrane is pearly gray.",
                "C. Tenderness is reported by the client when the mastoid area is palpated.",
                "D. Clear, watery fluid is draining from the client's ear."
            ],
            correct: 3, // D
            rationale: "For the client experiencing acute head trauma, immediately report the presence of clear, watery drainage from the ear. The fluid is likely to be cerebrospinal fluid associated with skull fracture. The ability to visualize the malleus is a normal physical assessment finding. The tympanic membrane is normally pearly gray in color. Tenderness of the mastoid area usually indicates inflammation. This should be reported, but is not a finding indicating urgent intervention. (PTS:1 REF:p.1948)"
        },
        {
            id: 6,
            question: "6. A client has been diagnosed with hearing loss related to damage of the cochlea. What term is used to describe this condition?",
            options: [
                "A. Exostoses",
                "B. Otalgia",
                "C. Sensorineural hearing loss",
                "D. Presbycusis"
            ],
            correct: 2, // C
            rationale: "Sensorineural hearing loss is loss of hearing related to damage of the end organ for hearing (cochlea) or cranial nerve VIII. Exostoses refer to small, hard, bony protrusions in the lower posterior bony portion of the ear canal. Otalgia refers to a sensation of fullness or pain in the ear. Presbycusis is the term used to refer to the progressive hearing loss associated with aging. Both middle and inner ear age-related changes result in hearing loss. (PTS:1 REF:p.1944)"
        },
        {
            id: 7,
            question: "7. A group of high school students is attending a concert, which will be at a volume of 80 to 90 dB. What is a health consequence of this sound level?",
            options: [
                "A. Hearing will not be affected by a decibel level in this range.",
                "B. Hearing loss may occur with a decibel level in this range.",
                "C. Sounds in this decibel level are not perceived to be harsh to the ear.",
                "D. Ear plugs will have no effect on these decibel levels."
            ],
            correct: 1, // B
            rationale: "Sound louder than 80 dB is perceived by the human ear to be harsh and can be damaging to the inner ear. Ear protection or plugs do help to minimize the effects of high decibel levels. (PTS:1 REF:p.1942)"
        },
        {
            id: 8,
            question: "8. A client with otosclerosis has significant hearing loss. What should the nurse do to best facilitate communication with the client?",
            options: [
                "A. Sit or stand in front of the client when speaking.",
                "B. Use exaggerated lip and mouth movements when talking.",
                "C. Stand in front of a light or window when speaking.",
                "D. Say the client's name loudly before starting to talk."
            ],
            correct: 0, // A
            rationale: "Standing directly in front of a hearing-impaired client allows him or her to lip-read and see facial expressions that offer clues to what is being said. Using exaggerated lip and mouth movements can make lip-reading more difficult by distorting words. Backlighting can create glare, making it difficult for the client to lip-read. To get the attention of a hearing-impaired client, gently touch the client's shoulder or stand in front of the client. (PTS:1 REF:p.1946)"
        },
        {
            id: 9,
            question: "9. The nurse in the ED is caring for a child brought in by the parents who state that the child will not stop crying and pulling at the child's ear. Based on information collected by the nurse, which of the following statements applies to a diagnosis of external otitis?",
            options: [
                "A. External otitis is characterized by aural tenderness.",
                "B. External otitis is usually accompanied by a high fever.",
                "C. External otitis is usually related to an upper respiratory infection.",
                "D. External otitis can be prevented by using cotton-tipped applicators to clean the ear."
            ],
            correct: 0, // A
            rationale: "Clients with otitis externa usually exhibit pain, discharge from the external auditory canal, and aural tenderness. Fever and accompanying upper respiratory infection occur more commonly in conjunction with otitis media (infection of the middle ear). Cotton-tipped applicators can actually cause external otitis so their use should be avoided. (PTS:1 REF:p.1948)"
        },
        {
            id: 10,
            question: "10. A client diagnosed with arthritis has been taking aspirin and now reports experiencing tinnitus and hearing loss. What should the nurse teach this client?",
            options: [
                "A. The hearing loss will likely resolve with time after the drug is discontinued.",
                "B. The client's hearing loss and tinnitus are irreversible at this point.",
                "C. The client's tinnitus is likely multifactorial, and not directly related to aspirin use.",
                "D. The client's tinnitus will abate as tolerance to aspirin develops."
            ],
            correct: 0, // A
            rationale: "Tinnitus and hearing loss are signs of ototoxicity, which is associated with aspirin use. In most cases, this will resolve upon discontinuing the aspirin. Many other drugs cause irreversible ototoxicity. (PTS:1 REF:p.1957)"
        },
        {
            id: 11,
            question: "11. A client is postoperative day 6 following tympanoplasty and mastoidectomy. The client has phoned the surgical unit and states experiencing occasional sharp, shooting pains in the affected ear. How should the nurse best interpret this client's report?",
            options: [
                "A. These pains are an expected finding during the first few weeks of recovery.",
                "B. The client's report is suggestive of a postoperative infection.",
                "C. The client may have experienced a spontaneous rupture of the tympanic membrane.",
                "D. The client's surgery may have been unsuccessful."
            ],
            correct: 0, // A
            rationale: "For 2 to 3 weeks after surgery, the client may experience sharp, shooting pains intermittently as the eustachian tube opens and allows air to enter the middle ear. Constant, throbbing pain accompanied by fever may indicate infection and should be reported to the primary care provider. The client's pain does not suggest tympanic perforation or unsuccessful surgery. (PTS:1 REF:p.1951)"
        },
        {
            id: 12,
            question: "12. The nurse is discussing the results of a client's diagnostic testing with the nurse practitioner. What Weber test result would indicate the presence of a sensorineural loss?",
            options: [
                "A. The sound is heard better in the ear in which hearing is better.",
                "B. The sound is heard equally in both ears.",
                "C. The sound is heard better in the ear in which hearing is poorer.",
                "D. The sound is heard longer in the ear in which hearing is better."
            ],
            correct: 0, // A
            rationale: "A client with sensorineural hearing loss hears the sound better in the ear in which hearing is better. The Weber test assesses bone conduction of sound and is used for assessing unilateral hearing loss. A tuning fork is used. A client with normal hearing hears the sound equally in both ears or describes the sound as centered in the middle of the head. A client whose hearing loss is conductive hears the sound better in the affected ear. (PTS:1 REF:p.1941)"
        },
        {
            id: 13,
            question: "13. The advanced practice nurse is attempting to examine the client's ear with an otoscope. Because of impacted cerumen, the tympanic membrane cannot be visualized. The nurse irrigates the client's ear with a solution of hydrogen peroxide and water to remove the impacted cerumen. What nursing intervention is most important to minimize nausea and vertigo during the procedure?",
            options: [
                "A. Maintain the irrigation fluid at a warm temperature.",
                "B. Instill short, sharp bursts of fluid into the ear canal.",
                "C. Follow the procedure with insertion of a cerumen curette to extract missed ear wax.",
                "D. Have the client stand during the procedure."
            ],
            correct: 0, // A
            rationale: "Warm water (never cold or hot) and gentle, not forceful, irrigation should be used to remove cerumen. Too forceful irrigation can cause perforation of the tympanic membrane, and ice water causes vomiting. Cerumen curettes should not be routinely used by the nurse. Special training is required to use a curette safely. It is unnecessary to have the client stand during the procedure. (PTS:1 REF:p.1946)"
        },
        {
            id: 14,
            question: "14. A client is scheduled to have an electronystagmography as part of a diagnostic workup for Ménière disease. What question is most important for the nurse to ask the client in preparation for this test?",
            options: [
                "A. Have you ever experienced claustrophobia or feelings of anxiety while in enclosed spaces?",
                "B. Do you currently take any tranquilizers or stimulants on a regular basis?",
                "C. Do you have a history of falls or problems with loss of balance?",
                "D. Do you have a history of either high or low blood pressure?"
            ],
            correct: 1, // B
            rationale: "Electronystagmography measures changes in electrical potentials created by eye movements during induced nystagmus. Medications such as tranquilizers, stimulants, or antivertigo agents are withheld for 5 days before the test. Claustrophobia is not a significant concern associated with this test; rather, it is most often a concern for clients undergoing magnetic resonance imaging (MRI). Balance is impaired by Ménière disease; therefore, a client history of balance problems is important, but is not relevant to test preparation. Hypertension or hypotension, while important health problems, should not be affected by this test. (PTS:1 REF:p.1943)"
        },
        {
            id: 15,
            question: "15. The nurse is planning the care of a client who is adapting to the use of a hearing aid for the first time. What is the most significant challenge this client is likely to experience?",
            options: [
                "A. Regulating the tone and volume",
                "B. Learning to cope with amplification of background noise",
                "C. Constant irritation of the external auditory canal",
                "D. Challenges in keeping the hearing aid clean while minimizing exposure to moisture"
            ],
            correct: 1, // B
            rationale: "Each of the answers represents a common problem experienced by clients using a hearing aid for the first time. However, amplification of background noise is a difficult problem to manage and is the major reason why clients stop using their hearing aid. All clients learning to use a hearing aid require support and coaching by the nurse and other members of the health care team. Clients should be encouraged to discuss their adaptation to the hearing aid with their audiologist. (PTS:1 REF:p.1958)"
        },
        {
            id: 16,
            question: "16. A client with mastoiditis is admitted to the postsurgical unit after undergoing a radical mastoidectomy. The nurse should identify what priority of postoperative care?",
            options: [
                "A. Assessing for mouth droop and decreased lateral eye gaze",
                "B. Assessing for increased middle ear pressure and perforated ear drum",
                "C. Assessing for gradual onset of conductive hearing loss and nystagmus",
                "D. Assessing for scar tissue and cerumen obstructing the auditory canal"

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
